name: test-and-lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write
  contents: read
  checks: write
  packages: write

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: dependencies
        uses: iwpnd/github-actions/actions/mise-install@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        run: make build

      - name: lint
        run: make lint

      - name: test
        run: make test

  tag-and-release:
    runs-on: ubuntu-latest
    needs: [test-and-lint]
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    steps:
      - name: release
        uses: iwpnd/github-actions/actions/release@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
